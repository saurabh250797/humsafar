<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mere Humsafar Ke Liye ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div id="heart-container"></div>

    <div class="glass-card">
        <div id="question-section">
            <h1 class="title">Suno... ❤️</h1>
            <p class="instruction">Ek sawal hai tumse,</p>
            <p class="question">Will you give me a <span>Physical Kiss</span> or a <span>Text Kiss</span>?</p>
            
            <div class="action-area">
                <button id="physical-btn" class="btn-main" onclick="showCelebration()">Physical Kiss 💋</button>
                <button id="text-btn" class="btn-sub">Text Kiss 📱</button>
            </div>
        </div>

        <div id="result-section" class="hidden">
            <div class="reveal-container">
                <img id="kiss-gif" src="https://media1.tenor.com/m/gSWpuhpGlbsAAAAC/bear-awoo.gif" alt="Kiss" class="romantic-gif">
                <div class="text-glow">
                    <h2 class="final-headline">41 Din Baad...</h2>
                    <p class="final-sub">Ye dooriyan khatam ho jayengi. <br> I miss you so much!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
